# Stow-managed: this file is symlinked to ~/.config/aerospace/aerospace.toml
# Aerospace reads config from $XDG_CONFIG_HOME/aerospace/aerospace.toml by default

# Config version for compatibility and deprecations
# Fallback value (if you omit the key): config-version = 1
config-version = 2

# You can use it to add commands that run after AeroSpace startup.
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
#
# borders active_color 当前对齐 Catppuccin Mocha peach (0xfffab387),与 sketchybar
# appearance.lua 的 P.peach 同源。borders CLI 颜色无法读取 sketchybar 主题,所以切主题
# (改 appearance.lua 的 M.active) 时,如果想让窗口外框也同步,需要手动改这一行。
after-startup-command = [
  # 'exec-and-forget borders active_color=0xfffab387 inactive_color=0x00000000 width=4.0 hidpi=on order=above',
  # Per-workspace root layout defaults (AeroSpace v0.21+).
  'layout --workspace 1̲Main --root accordion',
  'layout --workspace 2̲Sec --root accordion',
  'layout --workspace 3̲Chat --root tiles',
  'layout --workspace 4̲Work --root accordion',
  'layout --workspace 5̲Term --root tiles',
  'layout --workspace 6̲Play --root accordion',
  'exec-and-forget /bin/bash -c "sleep 0.3 && sketchybar --trigger space_windows_change"',
] 

# Start AeroSpace at login
start-at-login = true

# Automatically reload this config after saving changes.
# Requires one manual reload after toggling this option.
auto-reload-config = true

# Workspace/mode/focus changes are forwarded to SketchyBar by aerospace_watch
# (`aerospace subscribe`) under sketchybar helpers.
exec-on-workspace-change = []

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
# Global default is disabled; per-workspace root layout defaults are applied
# by after-startup-command above and can be reapplied from service mode.
# default-root-container-layout = 'accordion'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
# on-focus-changed = ['move-mouse window-lazy-center']

# Focus the window under the mouse cursor.
focus-follows-mouse.enabled = false

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = true

# List of workspaces that should stay alive even when they contain no windows,
# even when they are invisible.
# This config version is only available since 'config-version = 2'
# Fallback value (if you omit the key): persistent-workspaces = []
persistent-workspaces = ["1̲Main", "2̲Sec", "3̲Chat", "4̲Work", "5̲Term", "6̲Play"]

# A callback that runs every time binding mode changes
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
on-mode-changed = []

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 4
inner.vertical = 4
outer.left = 4
outer.bottom = 4
outer.top = [
  { monitor."Built-in Retina Display" = 4 },
  { monitor."VG271U" = 34 },
  { monitor."Mi Monitor" = 34 },
  34,
]
outer.right = 4
# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
    #                   sectionSign (ISO keyboards only, european keyboards only)
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # All possible modifiers: cmd, alt, ctrl, shift

    # All possible commands: https://nikitabobko.github.io/AeroSpace/commands

    # See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
    # You can uncomment the following lines to open up terminal with alt + enter shortcut
    # (like in i3)
    # alt-enter = '''exec-and-forget osascript -e '
    # tell application "Terminal"
    #     do script
    #     activate
    # end tell'
    # '''

    cmd-alt-ctrl-f = 'fullscreen'
    cmd-alt-ctrl-leftSquareBracket = 'workspace --wrap-around prev'
    cmd-alt-ctrl-rightSquareBracket = 'workspace --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout
    # Layout shortcuts for the focused container. If the focused window is in
    # the workspace root container, the whole workspace layout will change.
    # Workspace root defaults are managed by service mode "p".
    cmd-alt-ctrl-slash = 'layout tiles horizontal vertical'
    cmd-alt-ctrl-comma = 'layout accordion horizontal vertical'

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus

    cmd-alt-ctrl-left = 'focus --wrap-around left'
    cmd-alt-ctrl-down = 'focus --wrap-around down'
    cmd-alt-ctrl-up = 'focus --wrap-around up'
    cmd-alt-ctrl-right = 'focus --wrap-around right'

    cmd-alt-ctrl-h = 'focus --wrap-around left'
    cmd-alt-ctrl-j = 'focus --wrap-around down'
    cmd-alt-ctrl-k = 'focus --wrap-around up'
    cmd-alt-ctrl-l = 'focus --wrap-around right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    cmd-alt-ctrl-shift-left = 'move left'
    cmd-alt-ctrl-shift-down = 'move down'
    cmd-alt-ctrl-shift-up = 'move up'
    cmd-alt-ctrl-shift-right = 'move right'
    
    cmd-alt-ctrl-shift-h = 'move left'
    cmd-alt-ctrl-shift-j = 'move down'
    cmd-alt-ctrl-shift-k = 'move up'
    cmd-alt-ctrl-shift-l = 'move right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    cmd-alt-ctrl-minus = 'resize smart -20'
    cmd-alt-ctrl-equal = 'resize smart +20'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    cmd-alt-ctrl-1 = 'workspace 1̲Main'
    cmd-alt-ctrl-2 = 'workspace 2̲Sec'
    cmd-alt-ctrl-3 = 'workspace 3̲Chat'
    cmd-alt-ctrl-4 = 'workspace 4̲Work'
    cmd-alt-ctrl-5 = 'workspace 5̲Term'
    cmd-alt-ctrl-6 = 'workspace 6̲Play'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    # 注: 移动窗口后必须 trigger sketchybar 刷新窗口列表,
    # aerospace_watch 负责 workspace/focus/window-created 事件,
    # 但手动移动窗口不一定产生可覆盖的窗口列表变化事件。
    cmd-alt-ctrl-shift-1 = ['move-node-to-workspace 1̲Main --focus-follows-window', 'exec-and-forget sketchybar --trigger space_windows_change']
    cmd-alt-ctrl-shift-2 = ['move-node-to-workspace 2̲Sec --focus-follows-window', 'exec-and-forget sketchybar --trigger space_windows_change']
    cmd-alt-ctrl-shift-3 = ['move-node-to-workspace 3̲Chat --focus-follows-window', 'exec-and-forget sketchybar --trigger space_windows_change']
    cmd-alt-ctrl-shift-4 = ['move-node-to-workspace 4̲Work --focus-follows-window', 'exec-and-forget sketchybar --trigger space_windows_change']
    cmd-alt-ctrl-shift-5 = ['move-node-to-workspace 5̲Term --focus-follows-window', 'exec-and-forget sketchybar --trigger space_windows_change']
    cmd-alt-ctrl-shift-6 = ['move-node-to-workspace 6̲Play --focus-follows-window', 'exec-and-forget sketchybar --trigger space_windows_change'] 

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    # alt-tab = 'workspace-back-and-forth'
    cmd-alt-ctrl-tab = 'workspace-back-and-forth'
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
    cmd-alt-ctrl-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    cmd-alt-ctrl-semicolon = 'mode service'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc = ['reload-config --warnings-as-errors', 'mode main']
    c = ['run-callback --for-every-window on-window-detected', 'mode main'] # reapply window rules
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']
    # WARNING: 静默关闭所有空标题窗口（设计目的：清理不可见僵尸窗口）。
    # 入口需先 cmd-alt-ctrl-; 进 service mode，是双重确认机制的一部分。
    g = ['''exec-and-forget /bin/bash -c "aerospace list-windows --all --json | jq -r '.[] | select(.\"window-title\"==\"\") | .\"window-id\"' | xargs -n1 aerospace close --window-id"''', 'mode main']

    # Reapply per-workspace root layout defaults without switching workspaces.
    p = [
        'layout --workspace 1̲Main --root accordion',
        'layout --workspace 2̲Sec --root accordion',
        'layout --workspace 3̲Chat --root tiles',
        'layout --workspace 4̲Work --root accordion',
        'layout --workspace 5̲Term --root tiles',
        'layout --workspace 6̲Play --root accordion',
        'mode main',
    ]

    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    cmd-alt-ctrl-shift-left = ['join-with left', 'mode main']
    cmd-alt-ctrl-shift-down = ['join-with down', 'mode main']
    cmd-alt-ctrl-shift-up = ['join-with up', 'mode main']
    cmd-alt-ctrl-shift-right = ['join-with right', 'mode main']

    cmd-alt-ctrl-shift-h = ['join-with left', 'mode main']
    cmd-alt-ctrl-shift-j = ['join-with down', 'mode main']
    cmd-alt-ctrl-shift-k = ['join-with up', 'mode main']
    cmd-alt-ctrl-shift-l = ['join-with right', 'mode main']
    

# 设置界面自动悬浮
[[on-window-detected]]
if.window-title-regex-substring = '(setting|设置|LuLu|lulu|滴答|会议|钉钉会议|biagmeeting)'
check-further-callbacks = true
run = 'layout floating'

# 画中画窗口自动悬浮
[[on-window-detected]]
if.window-title-regex-substring = '(Picture-in-Picture|画中画)'
check-further-callbacks = true
run = 'layout floating'

# 设定总是悬浮的程序
[[on-window-detected]]
if = """test %{app-bundle-id} = net.nutstore.NutstoreJavaBE || \
        test %{app-bundle-id} = org.fcitx.inputmethod.Fcitx5 || \
        test %{app-bundle-id} = org.te4.T-Engine || \
        test %{app-bundle-id} = com.openai.chat || \
        test %{app-bundle-id} = com.sangfor.tray || \
        test %{app-bundle-id} = com.Hyperart.Barbee || \
        test %{app-bundle-id} = com.ibluebox.aqua-menu-bar || \
        test %{app-bundle-id} = com.ayangweb.BongoCat || \
        test %{app-bundle-id} = io.github.clash-verge-rev.clash-verge-rev || \
        test %{app-bundle-id} = com.google.GeminiMacOS || \
        test %{app-bundle-id} = iordv.Droppy || \
        test %{app-bundle-id} = com.sindresorhus.Plash || \
        test %{app-bundle-id} = net.nutstore.osxapp || \
        test %{app-bundle-id} = com.apple.Preview || \
        test %{app-bundle-id} = com.TickTick.task.mac || \
        test %{app-bundle-id} = com.hegenberg.BetterTouchTool || \
        test %{app-bundle-id} = com.raycast-x.macos || \
        test %{app-bundle-id} = xyz.chatboxapp.app || \
        test %{app-bundle-id} = com.bitwarden.desktop || \
        test %{app-bundle-id} = com.apple.finder || \
        test %{app-bundle-id} = com.HyperartFlow.Barbee.bb-agent || \
        test %{app-bundle-id} = com.apple.printcenter || \
        test %{app-bundle-id} = org.hammerspoon.Hammerspoon || \
        test %{app-bundle-id} = com.futureshocksoftware.inethack2 || \
        test %{app-bundle-id} = com.soundmindgames.GnollHack || \
        test %{app-bundle-id} = com.blizzard.worldofwarcraft || \
        test %{app-bundle-id} = com.daisydiskapp.DaisyDiskStandAlone || \
        test %{app-bundle-id} = com.vlbor.ColorLinesNG || \
        test %{app-bundle-id} = com.sleepyrhinosgames.popseven || \
        test %{app-bundle-id} = com.tencent.flue.WeChatAppEx || \
        test %{app-bundle-id} = com.superultra.Homerow || \
        test %{app-bundle-id} = app.remixdesign.LaunchOS || \
        test %{app-bundle-id} = com.objective-see.blockblock.helper || \
        test %{app-bundle-id} = com.lwouis.alt-tab-macos || \
        test %{app-bundle-id} = com.bjango.istatmenus.status"""
run = 'layout floating'

[[on-window-detected]]
if = 'test %{app-bundle-id} = com.enlink.EnUES'
run = ["layout floating", "move-node-to-workspace 2̲Sec --focus-follows-window"]

[[on-window-detected]]
if = """test %{app-bundle-id} = cn.unisk.wohuiyi || \
        test %{app-bundle-id} = com.tencent.meeting"""
run = ["layout floating",
       "move-node-to-workspace 3̲Chat --focus-follows-window"
      ]

[[on-window-detected]] # 微信浮窗
if.app-id = "com.tencent.xinWeChat"
if.window-title-regex-substring = '(^(?!\s*微信\s*$).*$)'
run = ["layout floating",
       "move-node-to-workspace 3̲Chat"
      ]

[[on-window-detected]] # 钉钉浮窗
if.app-id = "com.alibaba.DingTalkMac"
if.window-title-regex-substring = '(^(?!.*钉钉).*$)'
run = ["layout floating",
       "move-node-to-workspace 3̲Chat"
      ]

[[on-window-detected]] # VidHub播放浮窗
if.app-id = "com.mac.utility.media.hub"
if.window-title-regex-substring = '(^(?!.*媒体库).*(视频播放器).*)'
run = ["layout floating",
       "move-node-to-workspace 6̲Play",
      ]

#根据程序自动设定工作区
# Edge (Chromium) — AeroSpace #1562 已知 Electron 应用检测不可靠，备用手动快捷键 cmd-alt-ctrl-shift-b
