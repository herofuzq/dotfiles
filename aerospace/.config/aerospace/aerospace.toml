if.app-name-regex-substring = 'QQ音乐'
run = ["move-node-to-workspace 6̲Play --focus-follows-window"] 

[[on-window-detected]]
if = """test %{app-bundle-id} = com.jinghaoshe.qspace.pro || \
        test %{app-bundle-id} = com.electron.ollama || \
        test %{app-bundle-id} = ai.elementlabs.lmstudio || \
