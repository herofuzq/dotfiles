if = """test %{app-bundle-id} = com.microsoft.edgemac || \
        test %{app-bundle-id} = com.brave.Browser || \
        test %{app-bundle-id} = app.zen-browser.zen || \
        test %{app-bundle-id} = com.kagi.kagimacOS || \
        test %{app-bundle-id} = net.imput.helium"""
run = ["move-node-to-workspace 1̲Main --focus-follows-window"]

[[on-window-detected]]
if = """test %{app-bundle-id} = com.kingsoft.wpsoffice.mac || \
        test %{app-bundle-id} = com.tableausoftware.tableaudesktop || \
        test %{app-bundle-id} = md.obsidian || \
        test %{app-bundle-id} = abnerworks.Typora || \
        test %{app-bundle-id} = com.tencent.qclaw || \
        test %{app-bundle-id} = com.emclient.mail.client || \
        test %{app-bundle-id} = com.workreview.app"""
