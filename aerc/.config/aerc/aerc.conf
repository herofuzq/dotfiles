# aerc 主配置
#
# 完整文档：man aerc-config (5) 或 aerc 自带的 share/doc/
# 本文件只列显式覆盖默认值的项；未列出的项走 aerc 编译期默认值。

[ui]
# 主题：aerc 0.21+ 自带 catppuccin styleset（Mocha 风味）
# 位于 /opt/homebrew/Cellar/aerc/<ver>/share/aerc/stylesets/catppuccin
# 自定义可放到 ~/Library/Preferences/aerc/stylesets/，文件名作为 styleset-name
styleset-name = catppuccin

# 线程视图：IMAP server 不支持时由 aerc client-side 兜底
# 联通邮箱 IMAP 通常不返回 thread info，client-side 重建更可靠
threading-enabled = true
threading-by-subject = true

# tab title 显示未读数（多账户切换时一眼看到哪个有未读）
tab-title-account = {{.Account}} {{if .Unread}}({{.Unread}}){{end}}

# 文件夹列表宽度（默认 22）。联通邮箱 nested folder 较多，宽一点
sidebar-width = 28

# 文件夹树形显示
dirlist-tree = true

# split view 时自动 mark as read（默认 false；开了更顺手）
auto-mark-read-split = true

# 模糊补全（命令和参数都模糊匹配）
fuzzy-complete = true

[compose]
# 用 nvim 在 embedded terminal 里写邮件
# 终端主题跟着 kitty/ghostty 的 catppuccin 走
editor = nvim

# 空 subject 提醒发送
empty-subject-warning = true

# 附件关键词提醒（body 里写了"附件"但没 attach）
no-attachment-warning = ^[^>]*attach(ed|ment)?

[viewer]
# 默认不显示 full headers，需要时按 H toggle
# 真要看全 header 切到 :toggle-headers
show-headers = false

# multipart/alternative 邮件里优先选 text/html 渲染
# aerc 默认是 text/plain 优先，联通邮箱 HTML 邮件多，反过来更顺手
# 写一个 mime 时直接当 text/html 处理（没 text/plain part 时也用这个 fallback）
alternatives = text/html,text/plain

[general]
# 调试用 log；不打开就留空
# log-file = ~/.local/share/aerc/aerc.log
log-level = info

[hooks]
# 新邮件 macOS 原生通知（取消注释启用）
# 环境变量：AERC_ACCOUNT / AERC_FOLDER / AERC_FROM_NAME / AERC_FROM_ADDRESS / AERC_SUBJECT
# mail-received = osascript -e 'display notification "From: $AERC_FROM_NAME" with title "$AERC_SUBJECT" subtitle "[$AERC_ACCOUNT/$AERC_FOLDER]"'

# 邮件体渲染：aerc 0.21 不再内置 filter 映射，必须显式写
# 可执行 filter 在 /opt/homebrew/Cellar/aerc/0.21.0/libexec/aerc/filters/
# (colorize, html/用 w3m, plaintext, calendar, wrap, hldiff)
#
# ! 前缀：aerc 不再用 pager wrap（filter 自己处理输出）
#
# 这一段只处理 **邮件体**（用户进入 viewer 直接看的部分）。
# **附件**（image/zip/pdf/.html 文件等）走下面 [openers] 调 yazi 接管。
[filters]
# text/plain 邮件体用 colorize 高亮（quote/diff/git 识别）
text/plain=colorize
# text/calendar: 会议邀请解析
text/calendar=calendar
# 退信 / 嵌套邮件
message/delivery-status=colorize
message/rfc822=colorize
# HTML 邮件体 → w3m 转 text，! 避免 pager 重复 wrap
# （aerc 自带的 html filter 内部调 w3m；w3m 在 Brewfile 声明）
text/html=! html
# headers 显示时高亮
.headers=colorize
# application/octet-stream 不在 [filters] 配 ——
# [filters] 是邮件体 / part 在 pager 里的渲染规则，cat -v 把 binary 转 printable 控制字符
# 看起来就是一堆乱码（application/octet-stream 是 binary 附件，Pager 里渲不可能有意义）。
# 不配 → aerc viewer 默认显示文件名 + 大小 + MIME info，按 o 调 [openers] 调 open / 系统 handler。

# 附件预览：aerc viewer 里按 O / Enter 调 yazi 接管
# yazi 自己的 preview 体系（w3m/chafa/triangle/pdf/archive）远强于 aerc 内置，
# 把附件丢给它看体验一致
#
# text/html 邮件体不在这里（用上面 [filters] 直接看），独立 .html 附件走 yazi
# text/* 没配 → aerc :open fallback 走 macOS `open`（系统 handler）
#
# TTY workaround: aerc 0.21 用 vaxis，自身已经在 alt screen。
# 调外部 alt-screen TUI (yazi) 时如果 vaxis 没主动 ExitAltScreen，
# 会两个 alt screen 状态叠加导致乱码。
# 修法: 调 yazi 前发 tput rmcup 退出 alt screen，退 yazi 后 tput smcup 恢复。
# 不一定 100% 修（依赖终端 / 终端模拟器类型），无效就降级到 `open` (macOS)。
#
# aerc 官方 [openers] 设计就只支持 GUI 应用（man page 示例全是 hexchat / surf / gvim / thunderbird）。
# 调 TUI 应用 (yazi / lf / ranger) 不在官方支持范围，乱码是 expected。
# 采用 "aerc 官方语义" 设计：[openers] 调 GUI 应用，邮件体由 [filters] 处理（aerc 内部 vaxis terminal）。
[openers]
# 文本 / HTML 邮件体已经在 [filters] 用 w3m 处理。
# 这里只处理 **附件**，调 macOS GUI / 系统 handler：
# 图片 → Preview.app
image/*=open {}
# PDF → Preview.app
application/pdf=open {}
# 独立 .html 附件 → 默认浏览器
text/html=open {}
# 压缩包 → 在 aerc 内置 pager 看 list（不上 yazi 避免 TUI 冲突）
application/zip=sh -c 'unzip -l "$1" 2>&1 | head -100; echo; echo "[Enter]"; read _' -- {}
application/x-tar=sh -c 'tar tf "$1" 2>&1 | head -100; echo; echo "[Enter]"; read _' -- {}
application/x-gzip=sh -c 'file "$1"; tar tzf "$1" 2>&1 | head -100; echo; echo "[Enter]"; read _' -- {}
application/x-bzip2=sh -c 'file "$1"; tar tjf "$1" 2>&1 | head -100; echo; echo "[Enter]"; read _' -- {}
application/x-7z-compressed=sh -c '7z l "$1" 2>&1 | head -100 || (file "$1"; echo "[Enter]"; read _)' -- {}
# 文本类附件 → bat 高亮（在 aerc 内置 pager 显示）
# text/* 没配 → 走 macOS `open` (默认 text editor)
# 嵌套邮件
application/mbox=open {}
message/rfc822=open {}
# Office → macOS Pages / Numbers / Keynote
application/vnd.openxmlformats-officedocument.*=open {}
application/vnd.ms-*=open {}
# binary 兜底 → macOS Quick Look / 系统 handler
application/octet-stream=open {}
application/*=open {}
