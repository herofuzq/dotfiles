format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$character"""

right_format = """
$status\
$cmd_duration\
${custom.time}\
"""

add_newline = false

[directory]
read_only = " у°Ңҫ"
style = "fg:blue"
read_only_style = "fg:bright-red"
truncation_length = 3
truncation_symbol = "вҖҰ/"
format = "[о—ҫ $path]($style)[$read_only]($read_only_style) "

[os]
disabled = false
format = "[$symbol ]($style)"
style = "fg:purple"

[custom.time]
when = true
command = """
#!/bin/zsh
HOUR=$(date +%H)
TIME=$(date "+%Y-%m-%d %H:%M")
if [ $HOUR -lt 6 ]; then
    ICON="вҸҫ"  # еҮҢжҷЁ
elif [ $HOUR -lt 12 ]; then
    ICON="вҳј"   # дёҠеҚҲ
elif [ $HOUR -lt 18 ]; then
    ICON="вӣ…пёҺ"   # дёӢеҚҲ
else
    ICON="вҳӘпёҺ"   # жҷҡдёҠ
fi
echo "$ICON $TIME"
"""
# shell = ["zsh", "-c"]
style = "fg:gray"
format = "[$output]($style)"

[status]
disabled = false
symbol = "[вңҳ](bold red) $status"
success_symbol = "[вң”пёҺ](bold green)"
format = "$symbol "
map_symbol = false

[cmd_duration]
disabled = false
min_time = 2000
format = "[вҳ•пёҺ$duration]($style) "
style = "bold fg:yellow"

