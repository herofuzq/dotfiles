[mgr]
ratio = [2, 3, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_fallback = "alphabetical"
sort_translit = false
linemode = "none"
show_hidden = false
show_symlink = true
scrolloff = 5
mouse_events = ["click", "scroll", "drag"]
# title_format removed in yazi 26.5.6 — use DDS event `ind-app-title` instead

[preview]
wrap = "no"
tab_size = 2
# Higher ceiling so zoom.yazi can enlarge previews further
max_width = 2400
max_height = 2400
cache_dir = ""
image_delay = 30
image_filter = "triangle"
image_quality = 75
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
	{ run = '$EDITOR "$@"', desc = "Edit", for = "unix", block = true },
	{ run = "code %s", desc = "code", for = "windows", orphan = true },
	{ run = "code -w %s", desc = "code (block)", for = "windows", block = true },
]
play = [
	{ run = "xdg-open %s1", desc = "Play", for = "linux" },
	{ run = "open %s", desc = "Play", for = "macos" },
	{ run = 'start "" %s1', orphan = true, desc = "Play", for = "windows" },
	{ run = "termux-open %s1", desc = "Play", for = "android" },
	{ run = "mediainfo %s1; echo 'Press enter to exit'; read _", block = true, desc = "Show media info", for = "unix" },
	{ run = "mediainfo %s1 & pause", block = true, desc = "Show media info", for = "windows" },
]
open = [
	{ run = "xdg-open %s1", desc = "Open", for = "linux" },
	{ run = "open %s", desc = "Open", for = "macos" },
	{ run = 'start "" %s1', desc = "Open", for = "windows", orphan = true },
	{ run = "termux-open %s1", desc = "Open", for = "android" },
]
reveal = [
	{ run = "xdg-open %d1", desc = "Reveal", for = "linux" },
	{ run = "open -R %s1", desc = "Reveal", for = "macos" },
	{ run = "explorer /select,%s1", desc = "Reveal", for = "windows", orphan = true },
	{ run = "termux-open %d1", desc = "Reveal", for = "android" },
	{ run = "clear; exiftool %s1; echo 'Press enter to exit'; read _", desc = "Show EXIF", for = "unix", block = true },
]
image = [
	{ run = 'open -a XnViewMP %s', desc = "XnView MP", for = "macos", orphan = true },
]
open_terminal = [
	# %d1 = dirname of first selected file (= CWD when browsing a directory listing)
	{ run = 'open -a Warp "%d1"', desc = "Terminal", for = "unix", orphan = true },
]
extract = [{ run = "ya pub extract --list %s", desc = "Extract here" }]
extract_rar = [{ run = 'unar -output-directory %d %s', desc = "Extract RAR with unar", for = "unix" }]
download = [
	{ run = "ya emit download --open %S", desc = "Download and open" },
	{ run = "ya emit download %S", desc = "Download" },
]

[open]
rules = [
	# Folder
	{ url = "*/", use = ["edit", "open", "open_terminal", "reveal"] },
	# HTML — Edit first, macOS association second
	{ url = "*.{html,htm}", use = ["edit", "open", "open_terminal", "reveal"] },
	# Text — Edit (nvim) first, macOS file association second, Terminal in this dir
	{ url = "*.sh",  use = ["edit", "open", "open_terminal", "reveal"] },
	{ url = "*.csv", use = ["edit", "open", "open_terminal", "reveal"] },
	{ mime = "text/x-shellscript", use = ["edit", "open", "open_terminal", "reveal"] },
	{ mime = "text/csv",           use = ["edit", "open", "open_terminal", "reveal"] },
	{ mime = "text/*", use = ["edit", "open", "open_terminal", "reveal"] },
	# Image
	{ mime = "image/*", use = ["image", "open", "open_terminal", "reveal"] },
	# Media
	{ mime = "{audio,video}/*", use = ["play", "open_terminal", "reveal"] },
	# OFD
	{ url = "*.ofd", use = ["open", "open_terminal", "reveal"] },
	# Archive
	{ mime = "application/rar", use = ["extract_rar", "open_terminal", "reveal"] },
	{ mime = "application/{zip,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = ["extract", "open_terminal", "reveal"] },
	# JSON / JS
	{ mime = "application/{json,ndjson}", use = ["edit", "open", "open_terminal", "reveal"] },
	{ mime = "*/javascript", use = ["edit", "open", "open_terminal", "reveal"] },
	# Empty file
	{ mime = "inode/empty", use = ["edit", "open", "open_terminal", "reveal"] },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", use = "download" },
	# Fallback — Open first (Office/binary etc.), Edit second
	{ url = "*", use = ["open", "edit", "open_terminal", "reveal"] },
]

[tasks]
# Fine-grained worker control (replaces deprecated micro_workers/macro_workers in 26.5.6)
file_workers = 5
plugin_workers = 5
fetch_workers = 10
preload_workers = 3
process_workers = 5
bizarre_retry = 3
image_alloc = 536870912      # 512MB
image_bound = [10000, 10000]
suppress_preload = false

[plugin]
fetchers = [
	{ url = "*", run = "git", group = "git" },
	{ url = "*", run = "mactag", group = "mactag" },
	{ url = "*/", run = "mime.dir", prio = "high", group = "mime" },
	{ url = "local://*", run = "mime.local", prio = "high", group = "mime" },
	{ url = "remote://*", run = "mime.remote", prio = "high", group = "mime" },
]
spotters = [
	{ url = "*/", run = "folder" },
	# Code
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	# Video
	{ mime = "video/*", run = "video" },
	# Virtual file system
	{ mime = "vfs/*", run = "vfs" },
	# Error
	{ mime = "null/*", run = "null" },
	# Fallback
	{ url = "*", run = "file" },
]
preloaders = [
  # Office
  # { url = "*.[xX][lL][sS]*" , run = 'piper -- python3 -m xlsx2csv "$1" | bat --style=numbers --color=always --language=csv' },
	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	# Video
	{ mime = "video/*", run = "video" },
	# PDF
	{ mime = "application/pdf", run = "pdf" },
	# Font
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
]
previewers = [
	{ url = "*.tar*", run = 'piper --format=url -- tar tf "$1"' },
	{ url = "*.csv", run = 'piper -- bat -p --color=always "$1"' },
	{ mime = "application/sqlite3", run = 'piper -- sqlite3 "$1" ".schema --indent"' },
	# Office
	{ url = "*.[xX][lL][sS]*" , run = 'piper -- python3 -m xlsx2csv -s 0 "$1" | bat --style=header,grid --color=always --language=csv' },
	{ url = "*.[dD][oO][cC][xX]" , run = 'piper -- pandoc -f docx -t markdown "$1" | rich - -m --theme=monokai --max-width=$w' },
	{ url = "*.[dD][oO][cC]", run = 'piper -- textutil -stdout -convert txt "$1" | bat --style=header,grid --color=always --language=txt' },
	{ url = "*.[pP][pP][tT][xX]" , run = 'piper -- sh -c "python3 -c \"import sys, pptx; prs=pptx.Presentation(sys.argv[1]); [print(f\\\"--- Slide {i+1} ---\\\n\\\" + \\\"\n\\\".join([p.text for s in slide.shapes if s.has_text_frame for p in s.text_frame.paragraphs])) for i, slide in enumerate(prs.slides)]\" \"$1\" 2>/dev/null | bat --style=header,grid --color=always --language=csv"' },

	{ url = "*/", run = "folder" },
	# Code
	# HTML 必须放在 text/* 之前：previewers 按序匹配第一个命中
	# 否则 text/* 会先用 code previewer（语法高亮），不是 w3m 渲染结果
	{ mime = "text/html", run = 'piper --format=url -- w3m -dump -I UTF-8 -O UTF-8 -T text/html "$1"' },
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	# JSON
	{ mime = "application/{json,ndjson}", run = "json" },
	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	# Video
	{ mime = "video/*", run = "video" },
	# PDF
	{ mime = "application/pdf", run = "pdf" },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
	{ mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
	{ url = "*.{AppImage,appimage}", run = "archive" },
	# Virtual Disk / Disk Image
	{ mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
	{ mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
	{ url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },
	# Font
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
	# Empty file
	{ mime = "inode/empty", run = "empty" },
	# Virtual file system
	{ mime = "vfs/*", run = "vfs" },
	# Error
	{ mime = "null/*", run = "null" },
	# Fallback
	{ url = "*", run = "file" },
]

[input]
cursor_blink = false

# cd
cd_title = "Change directory:"
cd_origin = "top-center"
cd_offset = [0, 2, 50, 3]

# create
create_title = ["Create:", "Create (dir):"]
create_origin = "top-center"
create_offset = [0, 2, 50, 3]

# rename
rename_title = "Rename:"
rename_origin = "hovered"
rename_offset = [0, 1, 50, 3]

# filter
filter_title = "Filter:"
filter_origin = "top-center"
filter_offset = [0, 2, 50, 3]

# find
find_title = ["Find next:", "Find previous:"]
find_origin = "top-center"
find_offset = [0, 2, 50, 3]

# search
search_title = "Search via {n}:"
search_origin = "top-center"
search_offset = [0, 2, 50, 3]

# shell
shell_title = ["Shell:", "Shell (block):"]
shell_origin = "top-center"
shell_offset = [0, 2, 50, 3]

[confirm]
# trash
trash_title = "Trash {n} selected file{s}?"
trash_origin = "center"
trash_offset = [0, 0, 70, 20]

# delete
delete_title = "Permanently delete {n} selected file{s}?"
delete_origin = "center"
delete_offset = [0, 0, 70, 20]

# overwrite
overwrite_title = "Overwrite file?"
overwrite_body = "Will overwrite the following file:"
overwrite_origin = "center"
overwrite_offset = [0, 0, 50, 15]

# quit
quit_title = "Quit?"
quit_body = "The following tasks are still running, are you sure you want to quit?"
quit_origin = "center"
quit_offset = [0, 0, 50, 15]

[pick]
open_title = "Open with:"
open_origin = "hovered"
open_offset = [0, 1, 50, 7]

[which]
sort_by = "none"
sort_sensitive = false
sort_reverse = false
sort_translit = false
