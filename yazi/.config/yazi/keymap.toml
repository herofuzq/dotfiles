[mgr]

# Custom bindings only. Yazi's defaults remain active and can evolve with upgrades.
prepend_keymap = [
  { on = "i", run = "plugin searchjump -- autocd", desc = "Search jump mode" },
  { on = [ "g", "i" ], run = "plugin lazygit", desc = "Run lazygit" },
  { on = "q", run = "plugin autosession -- save-and-quit", desc = "Save session and quit" },
  { on = "Q", run = "quit --no-cwd-file", desc = "Quit without outputting cwd-file" },
  { on = "<C-c>", run = "close", desc = "Close the current tab, or quit if it's last" },
  { on = "<C-z>", run = "suspend", desc = "Suspend the process" },
  { on = "j", run = "arrow next", desc = "Next file with wraparound" },
  { on = "k", run = "arrow prev", desc = "Previous file with wraparound" },
  { on = "H", run = "plugin bypass reverse", desc = "Recursively enter parent directory" },
  { on = "L", run = "plugin bypass", desc = "Recursively enter child directory" },
  { on = "K", run = "seek -5", desc = "Seek up 5 units in the preview" },
  { on = "J", run = "seek 5", desc = "Seek down 5 units in the preview" },
  { on = [ "m", "=" ], run = "plugin zoom 1", desc = "Zoom in preview image" },
  { on = [ "m", "-" ], run = "plugin zoom -1", desc = "Zoom out preview image" },
  { on = "T", run = "plugin theme-toggle", desc = "Toggle dark/light theme" },
  { on = "<C-t>", run = "app:theme", desc = "Reload theme from disk" },
  { on = "s", run = "search --via=fd", desc = "Search files by name via fd" },
  { on = "S", run = "search --via=rg", desc = "Search files by content via ripgrep" },
  { on = "R", run = "search --via=rga", desc = "Search document contents via ripgrep-all" },
  { on = "z", run = "plugin fzf", desc = "Jump to a file/directory via fzf" },
  { on = "Z", run = "plugin zoxide", desc = "Jump to a directory via zoxide" },
  { on = [ "m", "s" ], run = "linemode size", desc = "Linemode: size" },
  { on = [ "m", "p" ], run = "linemode permissions", desc = "Linemode: permissions" },
  { on = [ "m", "b" ], run = "linemode btime", desc = "Linemode: btime" },
  { on = [ "m", "m" ], run = "linemode mtime", desc = "Linemode: mtime" },
  { on = [ "m", "o" ], run = "linemode owner", desc = "Linemode: owner" },
  { on = [ "m", "n" ], run = "linemode none", desc = "Linemode: none" },
  { on = [ "c", "a", "7" ], run = "plugin compress 7z", desc = "Archive selected files to 7z" },
  { on = [ "c", "a", "z" ], run = "plugin compress zip", desc = "Archive selected files to zip" },
  { on = [ "c", "a", "p" ], run = "plugin compress -p", desc = "Archive selected files with password" },
  { on = [ "c", "a", "l" ], run = "plugin compress -l", desc = "Archive selected files with compression level" },
  { on = [ "c", "i", "p" ], run = "plugin convert -- --extension='png'", desc = "Convert selected files to PNG" },
  { on = [ "c", "i", "j" ], run = "plugin convert -- --extension='jpg'", desc = "Convert selected files to JPG" },
  { on = [ "c", "i", "w" ], run = "plugin convert -- --extension='webp'", desc = "Convert selected files to WebP" },
  { on = [ "c", "c" ], run = "plugin clippy", desc = "Copy file to system clipboard" },
  { on = [ "c", "D" ], run = "plugin diff", desc = "Diff the selected with the hovered file" },
  { on = [ "c", "n" ], run = "copy name_without_ext", desc = "Copy the filename without extension" },
  { on = [ "b", "a" ], run = "plugin mactag add", desc = "Tag selected files" },
  { on = [ "b", "r" ], run = "plugin mactag remove", desc = "Untag selected files" },
  { on = [ ",", "m" ], run = [ "sort mtime --reverse=no", "linemode mtime" ], desc = "Sort by modified time" },
  { on = [ ",", "M" ], run = [ "sort mtime --reverse=yes", "linemode mtime" ], desc = "Sort by modified time (reverse)" },
  { on = [ ",", "b" ], run = [ "sort btime --reverse=no", "linemode btime" ], desc = "Sort by birth time" },
  { on = [ ",", "B" ], run = [ "sort btime --reverse=yes", "linemode btime" ], desc = "Sort by birth time (reverse)" },
  { on = [ "g", "h" ], run = "cd ~", desc = "Go home" },
  { on = [ "g", "c" ], run = "cd ~/.config", desc = "Go ~/.config" },
  { on = [ "g", "d" ], run = "cd ~/Downloads", desc = "Go ~/Downloads" },
  { on = [ "g", "D" ], run = "cd ~/Desktop", desc = "Go ~/Desktop" },
  { on = [ "g", "t" ], run = "cd /tmp", desc = "Go tmp" },
  { on = [ "g", "T" ], run = "cd ~/.Trash", desc = "Go Trash" },
  { on = [ "g", "w" ], run = "cd ~/Documents/工作/产品管理/2022-2026年", desc = "Go ~/Work" },
  { on = [ "g", "<Space>" ], run = "cd --interactive", desc = "Jump interactively" },
  { on = "t", run = "tab_create --current", desc = "Create a new tab with CWD" },
  { on = "w", run = "tasks:show", desc = "Show task manager" },
  { on = "l", run = "plugin bypass smart-enter", desc = "Open a file, or recursively enter child directory" },
]
